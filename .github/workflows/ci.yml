name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Stažení kódu
      uses: actions/checkout@v4

    - name: Nastavení Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalace závislostí
      run: npm ci

    - name: Generování Prisma klienta
      run: npx prisma generate

    - name: Build aplikace
      run: npm run build

    - name: Spuštění testů a měření pokrytí (Coverage)
      run: npm run test:cov
      
    - name: Nahrání Coverage reportu
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

    - name: Spuštění integračních E2E testů
      run: npm run test:e2e

    - name: Sestavení Docker image
      run: docker build -t event-booking-api .

    - name: Zabalení Docker image do souboru
      run: docker save -o event-booking-api.tar event-booking-api

    - name: Publikace Docker image jako artefaktu
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: event-booking-api.tar
        retention-days: 7